<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar Himnario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 30px;
        }
        .btn-download {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 5px 10px rgba(46, 204, 113, 0.3);
            transition: transform 0.2s;
        }
        .btn-download:active {
            transform: scale(0.95);
        }
        .info-nota {
            margin-top: 25px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📖 Himnario IPECHi</h1>
        <p>Presiona el botón de abajo para instalar la última versión de la aplicación en tu teléfono Android.</p>
        
        <a href="https://github.com/pentatonicchoir-ctrl/Himnario/releases/download/v1.0/app-debug.apk">
            📥 INSTALAR AHORA
        </a>

        <div class="info-nota">
            * Si tu teléfono te pide permisos para instalar, selecciona "Permitir desde esta fuente".
        </div>
    </div>

</body>
</html>
